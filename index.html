<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Timetable</title>
    <!-- PWA Setup -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #00d2ff;
        }

        body {
            margin: 0;
            padding: 20px;
            background: #000;
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            display: block;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 350px;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 15px;
            position: relative;
            box-sizing: border-box;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .active {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            transform: scale(1.02);
        }

        .day {
            color: var(--accent);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }

        .info {
            font-size: 0.9rem;
            opacity: 0.8;
            margin: 5px 0 15px 0;
        }

        .session {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        /* Mobile Optimizations */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            header {
                margin-bottom: 20px;
            }

            h1 {
                font-size: 1.75rem;
            }

            .card {
                padding: 15px;
                margin-bottom: 12px;
            }

            .session {
                padding: 10px 0;
            }
        }
    </style>
</head>

    <canvas id="matrix-canvas"></canvas>
    <header>
        <div style="position: relative; width: 100%; max-width: 350px;">
            <h1 style="margin:0">Master Timetable</h1>

            <div style="display: flex; gap: 10px; margin-top: 15px;">

                <select id="level-filter" onchange="renderSearch()" 
                        style="padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: #1e293b; color: white; font-size: 1rem; outline: none; cursor: pointer; min-width: 100px;">
                    <option value="">All Levels</option>
                    <option value="Level 3">L3</option>
                    <option value="Level 4">L4</option>
                    <option value="Level 5">L5</option>
                    <option value="Level 6">L6</option>
                </select>
            </div>
            <div id="status-msg" style="margin-top: 10px; color: var(--accent); font-size: 0.9rem; min-height: 1.2em;">
            </div>

            <!-- Info Button -->
            <button onclick="toggleModal()"
                style="position: absolute; top: 5px; right: 0; background: none; border: none; cursor: pointer;">
                <img src="about-icon.png" alt="Info" style="width: 24px; height: 24px; opacity: 0.6; display: block;">
            </button>
        </div>
    </header>

            <p style="font-size: 0.8rem; opacity: 0.5; margin-bottom: 20px;">Built by Erot Ekai Benard</p>

        function getSavedExams() {
            return JSON.parse(localStorage.getItem('myExams') || '[]');
        }

        function saveExam(detailsStr) {
            const saved = getSavedExams();
            if(!saved.includes(detailsStr)) {
                saved.push(detailsStr);
                localStorage.setItem('myExams', JSON.stringify(saved));
            }
            renderSearch();
        }

        function removeExam(detailsStr) {
            const saved = getSavedExams();
            const filtered = saved.filter(e => e !== detailsStr);
            localStorage.setItem('myExams', JSON.stringify(filtered));
            renderSearch();
        }

        function renderSearch() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const level = document.getElementById('level-filter').value.toLowerCase();
            const container = document.getElementById('schedule-container');
            container.innerHTML = '';
            
            const savedExams = getSavedExams();

            if (query.trim() === '' && level === '') {
                if (savedExams.length === 0) {
                    container.innerHTML = '<div style="text-align:center; opacity:0.6; margin-top: 20px;">Use the search or level filter to browse exams.<br><br>Click 📌 to save exams to your personal timetable.</div>';
                    return;
                }
                
                const myTitle = document.createElement('div');
                myTitle.innerHTML = '<h3 style="margin-bottom:15px; color:var(--accent); text-align:center;">📋 My Pinned Exams</h3>';
                container.appendChild(myTitle);

                const myExams = exams.filter(e => savedExams.includes(e.details));
                myExams.forEach(item => {
                    renderCard(item, container, true);
                });
                return;
            }

            const terms = query.split(' ').filter(t => t.trim().length > 0);
            if (level) terms.push(level); // Include level logic

            const filtered = exams.filter(e => {
                const searchStr = (e.details + ' ' + e.date + ' ' + e.day + ' ' + e.type).toLowerCase();
                return terms.every(term => searchStr.includes(term));
            });
            
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center; opacity:0.6; padding: 20px;">No exams found matching your criteria.</div>';
                return;
            }

            const searchTitle = document.createElement('div');
            searchTitle.innerHTML = '<h3 style="margin-bottom:15px; opacity:0.8; text-align:center; font-size:1rem;">🔍 Search Results (' + filtered.length + ')</h3>';
            container.appendChild(searchTitle);

            filtered.forEach(item => {
                const isSaved = savedExams.includes(item.details);
                renderCard(item, container, isSaved);
            });
        }

        function renderCard(item, container, isSaved) {
            const card = document.createElement('div');
            card.className = 'card active';
            card.style.borderColor = item.type === 'WRITTEN' ? '#ffaa00' : 'var(--accent)';
            
            const escapedDetails = item.details.replace(/'/g, "\\'");

            const actionBtn = isSaved 
                ? `<button onclick="removeExam('${escapedDetails}')" style="background:rgba(255,50,50,0.2); border:1px solid #ff3333; color:white; padding:5px 10px; border-radius:10px; cursor:pointer; font-size:0.8rem; float:right;">❌ Remove</button>`
                : `<button onclick="saveExam('${escapedDetails}')" style="background:var(--accent); border:none; color:#0f172a; font-weight:bold; padding:5px 10px; border-radius:10px; cursor:pointer; font-size:0.8rem; float:right;">📌 Save</button>`;

            const html = `
                <div style="margin-bottom: 8px;">
                    ${actionBtn}
                    <div class="day" style="color: ${item.type === 'WRITTEN' ? '#ffaa00' : 'var(--accent)'}">${item.date} • ${item.day}</div>
                </div>
                <div class="info" style="font-weight: bold; margin-bottom: 5px; opacity: 1;">${item.type} EXAM</div>
                <div class="info" style="font-size: 0.95rem; color: #fff; opacity: 0.9; margin-right: 20px;">${item.details}</div>
                <div class="session" style="border-top-color: rgba(255,255,255,0.1); margin-top: 15px;">
                    <span>🕒 ${item.time}</span>
                    <span>📌 Session ${item.session}</span>
                </div>
            `;
            card.innerHTML = html;
            container.appendChild(card);
        }

        function updateState() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }

        renderSearch();
        setInterval(updateState, 1000);
        updateState();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW failed', err));
            });
        }

        function toggleModal() {
            const modal = document.getElementById('about-modal');
            const isFlex = modal.style.display === 'flex';
            modal.style.display = isFlex ? 'none' : 'flex';
        }

        document.getElementById('about-modal').addEventListener('click', (e) => {
            if (e.target.id === 'about-modal') toggleModal();
        });

        // Matrix Background Logic
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const characters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%\"'#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let i = 0; i < columns; i++) {
            drops[i] = 1;
        }

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "#00d2ff"; // Cyan to match theme
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 35);
    </script>
